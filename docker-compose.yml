services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projet-e6-app
    ports:
      - '3000:3000'
    environment:
      DATA_BACKEND: postgres
      DATA_STRICT: 1
      PG_URL: postgres://postgres:postgres@postgres:5432/projet_e6
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: super-secret-token
      INFLUX_ORG: projet-e6
      INFLUX_BUCKET: aquaculture
      DEVICE_TIMEOUT_MS: 30000
      ALERT_EMAIL_MODE: formsubmit
      FORMSUBMIT_BASE_URL: https://formsubmit.co
      FORMSUBMIT_TEMPLATE: table
      FORMSUBMIT_DISABLE_CAPTCHA: 1
      PUBLIC_BASE_URL: http://localhost:3000
      PORT: 3000
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: projet-e6-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projet_e6
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d projet_e6']
      interval: 5s
      timeout: 5s
      retries: 20

  influxdb:
    image: influxdb:2.7
    container_name: projet-e6-influx
    ports:
      - '8086:8086'
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin
      DOCKER_INFLUXDB_INIT_ORG: projet-e6
      DOCKER_INFLUXDB_INIT_BUCKET: aquaculture
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: super-secret-token
    volumes:
      - influx_data:/var/lib/influxdb2

volumes:
  postgres_data:
  influx_data:
